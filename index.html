<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Escape Room 🔓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Gothic', 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #0a0a0a;
            border: 3px solid #00ff00;
            border-radius: 5px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .game-screen {
            background: #000;
            border: 2px solid #00ff00;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .room-info {
            margin-bottom: 20px;
        }

        .room-name {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #ffff00;
        }

        .room-description {
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .items-section,
        .inventory-section,
        .exits-section {
            margin-bottom: 15px;
            padding: 10px;
            border-left: 2px solid #00ff00;
            padding-left: 15px;
        }

        .section-label {
            color: #00ffff;
            font-weight: bold;
        }

        .controls {
            background: #1a1a1a;
            border: 2px solid #00ff00;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .control-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .wasd-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .wasd-layout {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }

        .wasd-key {
            width: 60px;
            height: 60px;
            background: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            user-select: none;
        }

        .wasd-key:hover {
            background: #00cc00;
            transform: scale(1.1);
        }

        .wasd-key:active,
        .wasd-key.pressed {
            background: #ffffff;
            transform: scale(0.95);
        }

        .empty-space {
            width: 60px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 10px;
            background: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95em;
        }

        button:hover {
            background: #00cc00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        button:active {
            background: #ffffff;
            color: #000;
        }

        .output {
            background: #000;
            border: 2px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 80px;
            border-radius: 5px;
            font-size: 0.95em;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message {
            margin-bottom: 10px;
        }

        .success {
            color: #00ff00;
        }

        .warning {
            color: #ffff00;
        }

        .info {
            color: #00ffff;
        }

        .end-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .end-screen h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #ffff00;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        .restart-button {
            font-size: 1.2em;
            padding: 15px 40px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .control-group {
                grid-template-columns: 1fr;
            }

            .wasd-layout {
                grid-template-columns: repeat(3, 50px);
            }

            .wasd-key {
                width: 50px;
                height: 50px;
                font-size: 1em;
            }

            .empty-space {
                width: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Not Escape Room 🔓</h1>

        <div class="game-screen" id="gameScreen">
            <div class="room-info">
                <div class="room-name" id="roomName">入口</div>
                <div class="room-description" id="roomDescription"></div>
            </div>

            <div class="items-section" id="itemsSection" style="display: none;">
                <span class="section-label">【アイテム】</span>
                <span id="items"></span>
            </div>

            <div class="inventory-section">
                <span class="section-label">【インベントリ】</span>
                <span id="inventory">なし</span>
            </div>

            <div class="exits-section" id="exitsSection">
                <span class="section-label">【移動可能な方向】</span>
                <span id="exits"></span>
            </div>
        </div>

        <div class="output" id="output"></div>

        <div class="controls">
            <div class="control-group">
                <div class="wasd-controls">
                    <div style="color: #00ffff; font-weight: bold; margin-bottom: 10px;">WASD移動</div>
                    <div class="wasd-layout">
                        <div class="empty-space"></div>
                        <button class="wasd-key" data-key="w" title="北へ移動">W</button>
                        <div class="empty-space"></div>
                        <button class="wasd-key" data-key="a" title="西へ移動">A</button>
                        <button class="wasd-key" data-key="s" title="南へ移動">S</button>
                        <button class="wasd-key" data-key="d" title="東へ移動">D</button>
                    </div>
                </div>

                <div class="button-group" style="flex-direction: column;">
                    <button id="takeBtn" title="アイテムを取得">T: 取得</button>
                    <button id="inventoryBtn" title="インベントリ確認">I: インベントリ</button>
                    <button id="hintBtn" title="ヒント表示">H: ヒント</button>
                    <button id="restartBtn" title="ゲーム再開">R: リセット</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const game = {
            rooms: {
                'entrance': {
                    description: '脱出ルームの入口。古びたドアと謎の装置がある。',
                    items: ['key', 'note'],
                    north: 'puzzle_room',
                    south: null,
                    east: 'storage',
                    west: null,
                    displayName: '入口',
                },
                'puzzle_room': {
                    description: 'パズルの部屋。壁に複雑な暗号が書かれている。',
                    items: ['puzzle_piece'],
                    north: null,
                    south: 'entrance',
                    east: 'library',
                    west: null,
                    displayName: 'パズルの部屋',
                },
                'storage': {
                    description: '物置。様々なアイテムが積み重ねられている。',
                    items: ['hammer', 'rope'],
                    north: null,
                    south: null,
                    east: null,
                    west: 'entrance',
                    displayName: '物置',
                },
                'library': {
                    description: '図書館。本棚に囲まれている。',
                    items: ['book', 'secret_scroll'],
                    north: null,
                    south: null,
                    east: 'exit',
                    west: 'puzzle_room',
                    displayName: '図書館',
                },
                'exit': {
                    description: '脱出口！ここから出ることができる。',
                    items: [],
                    north: null,
                    south: null,
                    east: null,
                    west: 'library',
                    displayName: '脱出口',
                },
            },

            currentRoom: 'entrance',
            inventory: [],
            escaped: false,
            lastMessage: '',

            init() {
                this.currentRoom = 'entrance';
                this.inventory = [];
                this.escaped = false;
                this.updateDisplay();
            },

            updateDisplay() {
                const room = this.rooms[this.currentRoom];
                document.getElementById('roomName').textContent = room.displayName;
                document.getElementById('roomDescription').textContent = room.description;

                // アイテム表示
                const itemsSection = document.getElementById('itemsSection');
                if (room.items.length > 0) {
                    document.getElementById('items').textContent = room.items.join('、');
                    itemsSection.style.display = 'block';
                } else {
                    itemsSection.style.display = 'none';
                }

                // インベントリ表示
                document.getElementById('inventory').textContent = this.inventory.length > 0 ? this.inventory.join('、') : 'なし';

                // 移動可能な方向
                const exits = [];
                if (room.north) exits.push('北(W)');
                if (room.south) exits.push('南(S)');
                if (room.east) exits.push('東(D)');
                if (room.west) exits.push('西(A)');
                document.getElementById('exits').textContent = exits.length > 0 ? exits.join('  ') : 'なし';
            },

            move(direction) {
                const room = this.rooms[this.currentRoom];
                let nextRoom = null;
                let directionName = '';

                if (direction === 'north' && room.north) {
                    nextRoom = room.north;
                    directionName = '北';
                } else if (direction === 'south' && room.south) {
                    nextRoom = room.south;
                    directionName = '南';
                } else if (direction === 'east' && room.east) {
                    nextRoom = room.east;
                    directionName = '東';
                } else if (direction === 'west' && room.west) {
                    nextRoom = room.west;
                    directionName = '西';
                }

                if (nextRoom) {
                    this.currentRoom = nextRoom;
                    this.lastMessage = `${directionName}へ移動しました。`;

                    if (this.currentRoom === 'exit') {
                        this.escaped = true;
                        this.showEndScreen();
                    } else {
                        this.updateDisplay();
                    }
                } else {
                    this.lastMessage = 'その方向には移動できません。';
                }

                this.displayMessage(this.lastMessage);
            },

            takeItem() {
                const room = this.rooms[this.currentRoom];
                if (room.items.length === 0) {
                    this.lastMessage = 'ここにはアイテムがありません。';
                } else {
                    const item = room.items.shift();
                    this.inventory.push(item);
                    this.lastMessage = `<span class="success">${item}を取得しました。</span>`;
                    this.updateDisplay();
                }
                this.displayMessage(this.lastMessage);
            },

            showHint() {
                const hints = {
                    'entrance': '装置には何か入力できそうだ...',
                    'puzzle_room': '暗号を解くには、複数のヒントが必要かもしれない...',
                    'storage': 'ロープとハンマーがあると、何かできそう...',
                    'library': 'この本の中に秘密があるかもしれない...',
                    'exit': 'これが脱出口だ！',
                };
                this.lastMessage = `<span class="info">【ヒント】${hints[this.currentRoom] || 'ヒントはありません。'}</span>`;
                this.displayMessage(this.lastMessage);
            },

            displayMessage(message) {
                const output = document.getElementById('output');
                if (message.includes('<')) {
                    output.innerHTML = `<div class="message">${message}</div>`;
                } else {
                    output.textContent = message;
                }
            },

            showEndScreen() {
                const gameScreen = document.querySelector('.game-screen');
                gameScreen.innerHTML = `
                    <div class="end-screen">
                        <h2>🎉 脱出成功！ 🎉</h2>
                        <p>おめでとうございます！</p>
                        <p style="margin-top: 20px; font-size: 1.1em;">脱出ルームから無事に脱出できました。</p>
                    </div>
                `;
                document.querySelector('.controls').style.display = 'none';
            }
        };

        // 初期化
        game.init();

        // WASDキーボタン
        document.querySelectorAll('.wasd-key').forEach(btn => {
            btn.addEventListener('click', function() {
                const key = this.dataset.key;
                handleWASD(key);
            });
        });

        // その他のボタン
        document.getElementById('takeBtn').addEventListener('click', () => {
            if (!game.escaped) game.takeItem();
        });

        document.getElementById('inventoryBtn').addEventListener('click', () => {
            game.displayMessage(`インベントリ: ${game.inventory.length > 0 ? game.inventory.join('、') : 'なし'}`);
        });

        document.getElementById('hintBtn').addEventListener('click', () => {
            if (!game.escaped) game.showHint();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            location.reload();
        });

        // キーボード入力
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'a', 's', 'd'].includes(key)) {
                e.preventDefault();
                handleWASD(key);
                // ビジュアルフィードバック
                const btn = document.querySelector(`[data-key="${key}"]`);
                if (btn) {
                    btn.classList.add('pressed');
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'a', 's', 'd'].includes(key)) {
                const btn = document.querySelector(`[data-key="${key}"]`);
                if (btn) {
                    btn.classList.remove('pressed');
                }
            }
        });

        function handleWASD(key) {
            if (game.escaped) return;

            const directions = {
                'w': 'north',
                's': 'south',
                'a': 'west',
                'd': 'east'
            };

            if (directions[key]) {
                game.move(directions[key]);
            }
        }
    </script>
</body>
</html>
