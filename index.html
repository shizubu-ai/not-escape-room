<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Escape Room 🔓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Gothic', 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #0a0a0a;
            border: 3px solid #00ff00;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2em;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            margin-bottom: 10px;
        }

        .game-wrapper {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .game-canvas-container {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .info-panel {
            background: #1a1a1a;
            border: 2px solid #00ff00;
            border-radius: 5px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-section {
            padding: 10px;
            border-left: 2px solid #00ff00;
            padding-left: 12px;
        }

        .info-label {
            color: #00ffff;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-content {
            color: #00ff00;
            font-size: 0.85em;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .controls {
            background: #1a1a1a;
            border: 2px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        button {
            padding: 10px;
            background: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
            font-family: 'MS Gothic', monospace;
        }

        button:hover {
            background: #00cc00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        button:active {
            background: #ffffff;
            color: #000;
        }

        .output {
            background: #000;
            border: 2px solid #00ff00;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 0.9em;
            line-height: 1.6;
            min-height: 60px;
            max-height: 150px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 8px;
        }

        .success {
            color: #00ff00;
        }

        .warning {
            color: #ffff00;
        }

        .info {
            color: #00ffff;
        }

        .error {
            color: #ff3333;
        }

        .solved-badge {
            display: inline-block;
            background: #00ff00;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75em;
            margin-top: 5px;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .game-wrapper {
                grid-template-columns: 1fr;
            }

            .info-panel {
                display: none;
            }
        }

        .controls-hint {
            font-size: 0.85em;
            color: #00ffff;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Not Escape Room 🔓</h1>
            <p style="color: #00ffff; font-size: 0.9em;">脱出ゲーム - WASDで移動してパズルを解きながら脱出を目指す</p>
        </div>

        <div class="game-wrapper">
            <div class="game-canvas-container">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="info-section">
                    <div class="info-label">【現在地】</div>
                    <div class="info-content" id="roomName">入口</div>
                </div>

                <div class="info-section">
                    <div class="info-label">【インベントリ】</div>
                    <div class="info-content" id="inventory">なし</div>
                </div>

                <div class="info-section">
                    <div class="info-label">【パズル進捗】</div>
                    <div class="info-content" id="puzzleProgress">0/5</div>
                    <div id="solvedPuzzles"></div>
                </div>

                <div class="info-section">
                    <div class="info-label">【ヒント】</div>
                    <div class="info-content" id="hint" style="font-size: 0.8em;">Hキーでヒント表示</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <button id="upBtn">▲ 上(W)</button>
                <button id="leftBtn">◀ 左(A)</button>
                <button id="downBtn">▼ 下(S)</button>
                <button id="rightBtn">▶ 右(D)</button>
                <button id="interactBtn">🔧 相互作用(E)</button>
                <button id="hintBtn">💡 ヒント(H)</button>
                <button id="restartBtn">🔄 リセット(R)</button>
            </div>
            <div class="controls-hint">
                💡 WASD: 移動 | E: アイテム取得/パズル解く | H: ヒント | R: リセット
            </div>
        </div>

        <div class="output" id="output"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲーム定数
        const TILE_SIZE = 40;
        const COLS = 20;
        const ROWS = 15;

        // ルームデータ
        const rooms = {
            'entrance': {
                name: '入口',
                width: 20,
                height: 15,
                startX: 10,
                startY: 12,
                description: '脱出ルームの入口。古びたドアと謎の装置がある。',
                tiles: [
                    '####################',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '####################'
                ],
                exits: { up: 'puzzle_room', right: 'storage' },
                exitPositions: { up: { x: 10, y: 0 }, right: { x: 19, y: 7 } },
                items: [
                    { x: 5, y: 5, id: 'key', name: '🔑鍵', collected: false },
                    { x: 15, y: 10, id: 'note', name: '📝メモ', collected: false }
                ],
                obstacles: [
                    { x: 3, y: 3, width: 3, height: 2, name: '装置' }
                ],
                puzzle: 'cipher_lock',
                puzzlePosition: { x: 4, y: 4 }
            },
            'puzzle_room': {
                name: 'パズルの部屋',
                width: 20,
                height: 15,
                startX: 10,
                startY: 12,
                description: 'パズルの部屋。壁に複雑な暗号が書かれている。',
                tiles: [
                    '####################',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#.....████........#',
                    '#.....████........#',
                    '#.....████........#',
                    '#..................#',
                    '#..................#',
                    '####################'
                ],
                exits: { down: 'entrance', right: 'library' },
                exitPositions: { down: { x: 10, y: 14 }, right: { x: 19, y: 7 } },
                items: [
                    { x: 14, y: 5, id: 'puzzle_piece', name: '🧩パズル', collected: false }
                ],
                obstacles: [
                    { x: 5, y: 9, width: 4, height: 3, name: 'スフィンクス' }
                ],
                puzzle: 'riddle_sphinx',
                puzzlePosition: { x: 7, y: 10 }
            },
            'storage': {
                name: '物置',
                width: 20,
                height: 15,
                startX: 1,
                startY: 7,
                description: '物置。様々なアイテムが積み重ねられている。',
                tiles: [
                    '####################',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '####################'
                ],
                exits: { left: 'entrance' },
                exitPositions: { left: { x: 0, y: 7 } },
                items: [
                    { x: 8, y: 5, id: 'hammer', name: '🔨ハンマー', collected: false },
                    { x: 12, y: 8, id: 'rope', name: '🪢ロープ', collected: false }
                ],
                obstacles: [
                    { x: 3, y: 4, width: 2, height: 4, name: '荷物' },
                    { x: 15, y: 3, width: 3, height: 5, name: '箱' }
                ],
                puzzle: 'math_puzzle',
                puzzlePosition: { x: 10, y: 10 }
            },
            'library': {
                name: '図書館',
                width: 20,
                height: 15,
                startX: 1,
                startY: 7,
                description: '図書館。本棚に囲まれている。',
                tiles: [
                    '####################',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '#██..............██#',
                    '####################'
                ],
                exits: { left: 'puzzle_room', right: 'exit' },
                exitPositions: { left: { x: 0, y: 7 }, right: { x: 19, y: 7 } },
                items: [
                    { x: 10, y: 5, id: 'book', name: '📖本', collected: false },
                    { x: 10, y: 10, id: 'secret_scroll', name: '📜巻物', collected: false }
                ],
                obstacles: [],
                puzzle: 'symbol_order',
                puzzlePosition: { x: 10, y: 7 }
            },
            'exit': {
                name: '脱出口',
                width: 20,
                height: 15,
                startX: 1,
                startY: 7,
                description: '脱出口！ここから出ることができる。',
                tiles: [
                    '####################',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '#..................#',
                    '####################'
                ],
                exits: { left: 'library' },
                exitPositions: { left: { x: 0, y: 7 } },
                items: [],
                obstacles: [],
                puzzle: 'code_puzzle',
                puzzlePosition: { x: 10, y: 3 }
            }
        };

        // パズルデータ
        const puzzles = {
            cipher_lock: {
                type: 'cipher',
                question: 'ROT13暗号: BCYRFFR_SBEYTRG_ZR',
                answer: 'PLEASE_FORGET_ME',
                hint: 'ROT13で13文字シフト',
                solved: false,
            },
            riddle_sphinx: {
                type: 'riddle',
                question: '朝は4本足、昼間は2本足、夜は3本足。これは何？',
                options: ['人間', '犬', '猫', 'ロボット'],
                answer: '人間',
                hint: '生まれたときは這って移動し、成長すると2本足で歩き、年を取ると杖を使う...',
                solved: false,
            },
            math_puzzle: {
                type: 'math',
                question: '3 + 5 - 2 = ?',
                answer: '6',
                hint: '順番に計算してください',
                solved: false,
            },
            symbol_order: {
                type: 'sequence',
                question: '◆ ● ■ ▲ ? の次は何？',
                options: ['★', '♦', '○', '◆'],
                answer: '★',
                hint: 'パターンを見つけましょう',
                solved: false,
            },
            code_puzzle: {
                type: 'code',
                question: 'A=1, B=2, C=3... のとき BEAD = ?',
                answer: '2146',
                hint: 'アルファベット順を数字に変換してください',
                solved: false,
            }
        };

        // ゲームオブジェクト
        const game = {
            currentRoom: 'entrance',
            playerX: rooms['entrance'].startX,
            playerY: rooms['entrance'].startY,
            inventory: [],
            escaped: false,
            messages: [],

            getRoom() {
                return rooms[this.currentRoom];
            },

            canMoveTo(x, y) {
                const room = this.getRoom();
                if (x < 0 || x >= room.width || y < 0 || y >= room.height) return false;
                const tile = room.tiles[y][x];
                if (tile === '#' || tile === '█') return false;
                for (let obs of room.obstacles) {
                    if (x >= obs.x && x < obs.x + obs.width && y >= obs.y && y < obs.y + obs.height) {
                        return false;
                    }
                }
                return true;
            },

            move(dx, dy) {
                if (this.escaped) return false;
                
                const newX = this.playerX + dx;
                const newY = this.playerY + dy;

                if (!this.canMoveTo(newX, newY)) {
                    return false;
                }

                // 出口チェック
                const room = this.getRoom();
                for (const [dir, nextRoom] of Object.entries(room.exits)) {
                    const pos = room.exitPositions[dir];
                    if (newX === pos.x && newY === pos.y) {
                        const nextRoomData = rooms[nextRoom];
                        
                        // 必須パズルチェック
                        if (nextRoom === 'library' && !puzzles.riddle_sphinx.solved) {
                            this.addMessage('🚫 パズルを解かないと先に進めません！');
                            return false;
                        }
                        if (nextRoom === 'exit' && !puzzles.symbol_order.solved) {
                            this.addMessage('🚫 パズルを解かないと脱出口に進めません！');
                            return false;
                        }

                        this.currentRoom = nextRoom;
                        this.playerX = nextRoomData.startX;
                        this.playerY = nextRoomData.startY;
                        this.addMessage(`✓ ${nextRoomData.name} に移動しました。`);

                        const nextPuzzle = nextRoomData.puzzle ? puzzles[nextRoomData.puzzle] : null;
                        if (nextRoom === 'exit' && (!nextPuzzle || nextPuzzle.solved)) {
                            this.escaped = true;
                            const solvedCount = Object.values(puzzles).filter(p => p.solved).length;
                            this.addMessage(`🎉 脱出成功！(${solvedCount}/5パズル解答)`);
                        }
                        return true;
                    }
                }

                this.playerX = newX;
                this.playerY = newY;
                return true;
            },

            interact() {
                if (this.escaped) return;
                
                const room = this.getRoom();

                // アイテム取得
                for (let i = room.items.length - 1; i >= 0; i--) {
                    const item = room.items[i];
                    if (Math.abs(this.playerX - item.x) <= 1 && Math.abs(this.playerY - item.y) <= 1 && !item.collected) {
                        item.collected = true;
                        this.inventory.push(item.id);
                        this.addMessage(`✓ ${item.name} を取得しました！`);
                        room.items.splice(i, 1);
                        return;
                    }
                }

                // パズル解く
                const puzzle = room.puzzle ? puzzles[room.puzzle] : null;
                if (puzzle && !puzzle.solved) {
                    const pos = room.puzzlePosition;
                    if (Math.abs(this.playerX - pos.x) <= 2 && Math.abs(this.playerY - pos.y) <= 2) {
                        this.showPuzzleDialog(room.puzzle);
                    }
                }
            },

            showPuzzleDialog(puzzleId) {
                const puzzle = puzzles[puzzleId];
                let answer = '';

                if (puzzle.type === 'riddle' || puzzle.type === 'sequence') {
                    const options = puzzle.options.map((opt, i) => `${i + 1}. ${opt}`).join(' / ');
                    answer = prompt(`${puzzle.question}\n\n${options}\n\n番号を入力してください (1-${puzzle.options.length}):`);
                    if (answer === null) return;
                    answer = puzzle.options[parseInt(answer) - 1] || '';
                } else {
                    answer = prompt(puzzle.question);
                    if (answer === null) return;
                }

                if (answer.toUpperCase() === puzzle.answer.toUpperCase()) {
                    puzzle.solved = true;
                    this.addMessage(`✓ 正解！パズルを解きました！`);
                } else {
                    this.addMessage(`✗ 不正解です。もう一度試してください。`);
                }
            },

            addMessage(msg) {
                this.messages.push(msg);
                if (this.messages.length > 5) this.messages.shift();
            },

            showHint() {
                const room = this.getRoom();
                const puzzle = room.puzzle ? puzzles[room.puzzle] : null;
                if (puzzle && !puzzle.solved) {
                    this.addMessage(`💡 ヒント: ${puzzle.hint}`);
                } else if (puzzle && puzzle.solved) {
                    this.addMessage(`✓ このパズルは既に解きました。`);
                } else {
                    this.addMessage('ここにはパズルはありません。');
                }
            }
        };

        // 描画関数
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const room = game.getRoom();

            // タイル描画
            for (let y = 0; y < room.height; y++) {
                for (let x = 0; x < room.width; x++) {
                    const tile = room.tiles[y][x];
                    const px = x * TILE_SIZE;
                    const py = y * TILE_SIZE;

                    if (tile === '#') {
                        ctx.fillStyle = '#00ff00';
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#00aa00';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
                    } else if (tile === '█') {
                        ctx.fillStyle = '#666';
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#444';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
                    }
                }
            }

            // アイテム描画
            for (const item of room.items) {
                if (!item.collected) {
                    const px = item.x * TILE_SIZE + TILE_SIZE / 2;
                    const py = item.y * TILE_SIZE + TILE_SIZE / 2;
                    
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(px, py, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#000';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.name[0], px, py);
                }
            }

            // パズル表示
            if (room.puzzle && !puzzles[room.puzzle].solved) {
                const pos = room.puzzlePosition;
                const px = pos.x * TILE_SIZE + TILE_SIZE / 2;
                const py = pos.y * TILE_SIZE + TILE_SIZE / 2;
                
                ctx.fillStyle = '#ff6600';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('❓', px, py);
            }

            // プレイヤー描画
            ctx.fillStyle = '#00ff00';
            ctx.font = '28px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧑', game.playerX * TILE_SIZE + TILE_SIZE / 2, game.playerY * TILE_SIZE + TILE_SIZE / 2);

            // UI描画
            ctx.fillStyle = '#00ff00';
            ctx.font = '12px MS Gothic';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`${room.name} | Pos: (${game.playerX}, ${game.playerY})`, 10, canvas.height - 5);
        }

        // イベントリスナー
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            switch (key) {
                case 'W': e.preventDefault(); game.move(0, -1); break;
                case 'A': e.preventDefault(); game.move(-1, 0); break;
                case 'S': e.preventDefault(); game.move(0, 1); break;
                case 'D': e.preventDefault(); game.move(1, 0); break;
                case 'E': e.preventDefault(); game.interact(); break;
                case 'H': e.preventDefault(); game.showHint(); break;
                case 'R': e.preventDefault(); location.reload(); break;
            }
        });

        document.getElementById('upBtn').addEventListener('click', () => game.move(0, -1));
        document.getElementById('downBtn').addEventListener('click', () => game.move(0, 1));
        document.getElementById('leftBtn').addEventListener('click', () => game.move(-1, 0));
        document.getElementById('rightBtn').addEventListener('click', () => game.move(1, 0));
        document.getElementById('interactBtn').addEventListener('click', () => game.interact());
        document.getElementById('hintBtn').addEventListener('click', () => game.showHint());
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());

        // UI更新
        function updateUI() {
            const room = game.getRoom();
            document.getElementById('roomName').textContent = room.name;
            
            let inventoryText = game.inventory.length > 0 
                ? game.inventory.map(id => {
                    // すべてのルームから該当アイテムを探す
                    for (const r of Object.values(rooms)) {
                        const found = r.items.find(i => i.id === id);
                        if (found) return found.name;
                    }
                    return id;
                }).join('\n')
                : 'なし';
            document.getElementById('inventory').textContent = inventoryText;

            const solvedCount = Object.values(puzzles).filter(p => p.solved).length;
            document.getElementById('puzzleProgress').textContent = `${solvedCount}/5`;

            document.getElementById('output').innerHTML = game.messages
                .map(m => `<div class="message">${m}</div>`)
                .join('');
        }

        // ゲームループ
        function gameLoop() {
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
