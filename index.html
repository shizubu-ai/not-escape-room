<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Escape Room 3D 🔓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Gothic', 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            width: 100%;
            height: 100vh;
        }

        #canvas {
            display: block;
        }

        .ui-container {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #00ff00;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            z-index: 100;
            pointer-events: none;
        }

        .hud {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            border-radius: 3px;
            padding: 10px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .info-panel {
            position: fixed;
            right: 10px;
            top: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 3px;
            padding: 15px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            color: #00ff00;
            font-size: 12px;
            z-index: 100;
        }

        .info-section {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff00;
        }

        .info-label {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .info-content {
            color: #00ff00;
        }

        .controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 3px;
            padding: 10px;
            color: #00ff00;
            font-size: 12px;
            max-width: 400px;
            z-index: 100;
        }

        .puzzle-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95);
            border: 3px solid #ff6600;
            border-radius: 5px;
            padding: 30px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.5);
            display: none;
            pointer-events: all;
        }

        .puzzle-dialog.active {
            display: block;
        }

        .puzzle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
            pointer-events: all;
        }

        .puzzle-overlay.active {
            display: block;
        }

        .puzzle-dialog h2 {
            color: #ff6600;
            margin-bottom: 15px;
            text-align: center;
        }

        .puzzle-question {
            color: #00ff00;
            margin-bottom: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-left: 3px solid #ff6600;
            border-radius: 3px;
        }

        .puzzle-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .puzzle-btn {
            padding: 10px;
            background: #1a1a1a;
            color: #00ff00;
            border: 2px solid #ff6600;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'MS Gothic', monospace;
        }

        .puzzle-btn:hover {
            background: #ff6600;
            color: #000;
        }

        .puzzle-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .puzzle-input input {
            flex: 1;
            padding: 8px;
            background: #000;
            color: #00ff00;
            border: 2px solid #ff6600;
            font-family: 'MS Gothic', monospace;
        }

        .message {
            position: fixed;
            bottom: 120px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            padding: 10px;
            border-radius: 3px;
            max-width: 400px;
            color: #00ff00;
            z-index: 100;
            font-size: 12px;
            animation: fadeInOut 3s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            pointer-events: none;
            z-index: 101;
            opacity: 0.5;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #00ff00;
        }

        .crosshair::before {
            width: 2px;
            height: 10px;
            left: 50%;
            top: -15px;
            transform: translateX(-50%);
        }

        .crosshair::after {
            width: 10px;
            height: 2px;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>

    <div class="ui-container">
        <div class="hud">
            <div>🔓 Not Escape Room 3D</div>
            <div id="roomStatus">入口</div>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-section">
            <div class="info-label">【現在地】</div>
            <div class="info-content" id="roomName">入口</div>
        </div>
        <div class="info-section">
            <div class="info-label">【インベントリ】</div>
            <div class="info-content" id="inventory">なし</div>
        </div>
        <div class="info-section">
            <div class="info-label">【パズル進捗】</div>
            <div class="info-content" id="puzzleProgress">0/5</div>
        </div>
        <div class="info-section">
            <div class="info-label">【操作ガイド】</div>
            <div class="info-content" style="font-size: 11px;">
                W/S: 前後移動<br>
                A/D: 右左移動<br>
                矢印キー: 視点操作<br>
                マウス: 視点操作<br>
                E: 相互作用<br>
                H: ヒント<br>
                ESC: 終了
            </div>
        </div>
    </div>

    <div class="controls">
        <div>💡 Eキーで近くのオブジェクトと相互作用できます</div>
        <div>❓ Hキーでヒントを表示</div>
    </div>

    <div class="crosshair"></div>

    <div class="puzzle-overlay" id="puzzleOverlay"></div>
    <div class="puzzle-dialog" id="puzzleDialog"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js シーン設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 100, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('gameContainer').appendChild(renderer.domElement);

        // ライティング
        const ambientLight = new THREE.AmbientLight(0x00ff00, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(50, 50, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 200;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        scene.add(directionalLight);

        // プレイヤーコントローラー
        const player = {
            position: new THREE.Vector3(0, 1.6, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            direction: new THREE.Vector3(0, 0, -1),
            canJump: false,
            speed: 0.15,
            sprintSpeed: 0.25
        };

        camera.position.copy(player.position);

        // マウスコントローラー
        let yaw = 0, pitch = 0;
        let mouseDown = false;
        const mouseSpeed = 0.002;

        document.addEventListener('mousedown', () => { mouseDown = true; });
        document.addEventListener('mouseup', () => { mouseDown = false; });
        document.addEventListener('mousemove', (e) => {
            if (!mouseDown && document.pointerLockElement !== document.body) return;
            yaw -= e.movementX * mouseSpeed;
            pitch -= e.movementY * mouseSpeed;
            pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
        });

        // ポインターロック（フルスクリーン）- ダイアログが開いていない時のみ
        document.addEventListener('click', (e) => {
            if (document.getElementById('puzzleDialog').classList.contains('active')) return;
            if (e.target.closest('.info-panel, .controls, .puzzle-dialog, .puzzle-overlay')) return;
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        });

        // キーボード入力
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'e') handleInteract();
            if (e.key.toLowerCase() === 'h') game.showHint();
            if (e.key === 'Escape') document.exitPointerLock();
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // パズルデータ
        const puzzles = {
            cipher_lock: {
                type: 'cipher',
                question: 'ROT13暗号を解読してください',
                cipherText: 'BCYRFFR_SBEYTRG_ZR',
                answer: 'PLEASE_FORGET_ME',
                hint: 'ROT13で13文字シフト',
                solved: false,
                position: new THREE.Vector3(-8, 1, 0)
            },
            riddle_sphinx: {
                type: 'riddle',
                question: 'スフィンクスの謎に答えなさい',
                riddle: '朝は4本足、昼間は2本足、夜は3本足。これは何？',
                options: ['人間', '犬', '猫', 'ロボット'],
                answer: '人間',
                hint: '生まれたときは這って移動し、成長すると2本足で歩き、年を取ると杖を使う...',
                solved: false,
                position: new THREE.Vector3(8, 1, 0)
            },
            math_puzzle: {
                type: 'math',
                question: '数学パズルを解いてください',
                problem: '3 + 5 - 2 = ?',
                answer: '6',
                hint: '順番に計算してください',
                solved: false,
                position: new THREE.Vector3(-8, 1, 20)
            },
            symbol_order: {
                type: 'sequence',
                question: 'シーケンスの次の図形は何か答えなさい',
                sequence: '◆ ● ■ ▲ ?',
                options: ['★', '♦', '○', '◆'],
                answer: '★',
                hint: 'パターンを見つけましょう',
                solved: false,
                position: new THREE.Vector3(8, 1, 20)
            },
            code_puzzle: {
                type: 'code',
                question: 'コードを解読してください',
                problem: 'A=1, B=2, C=3... のとき BEAD = ?',
                answer: '2146',
                hint: 'アルファベット順を数字に変換してください',
                solved: false,
                position: new THREE.Vector3(0, 1, 40)
            }
        };

        // ゲーム状態
        const game = {
            currentRoom: 'entrance',
            inventory: [],
            messages: [],
            escaped: false,

            addMessage(msg) {
                this.messages.push(msg);
                const msgEl = document.createElement('div');
                msgEl.className = 'message';
                msgEl.textContent = msg;
                document.body.appendChild(msgEl);
                setTimeout(() => msgEl.remove(), 3000);
            },

            showHint() {
                for (const [id, puzzle] of Object.entries(puzzles)) {
                    if (!puzzle.solved && Math.hypot(
                        player.position.x - puzzle.position.x,
                        player.position.z - puzzle.position.z
                    ) < 5) {
                        this.addMessage(`💡 ${puzzle.hint}`);
                        return;
                    }
                }
            }
        };

        // ルーム作成関数
        function createRoom(name, color, position, size) {
            const group = new THREE.Group();
            
            // 床
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(size.x, size.z),
                new THREE.MeshStandardMaterial({ color, roughness: 0.8 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            group.add(floor);

            // 壁
            const wallMaterial = new THREE.MeshStandardMaterial({ color, roughness: 0.9 });
            
            // 北壁
            const wallN = new THREE.Mesh(new THREE.BoxGeometry(size.x, 3, 0.2), wallMaterial);
            wallN.position.z = -size.z / 2;
            wallN.position.y = 1.5;
            wallN.castShadow = true;
            group.add(wallN);

            // 南壁
            const wallS = new THREE.Mesh(new THREE.BoxGeometry(size.x, 3, 0.2), wallMaterial);
            wallS.position.z = size.z / 2;
            wallS.position.y = 1.5;
            wallS.castShadow = true;
            group.add(wallS);

            // 東壁
            const wallE = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, size.z), wallMaterial);
            wallE.position.x = size.x / 2;
            wallE.position.y = 1.5;
            wallE.castShadow = true;
            group.add(wallE);

            // 西壁
            const wallW = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, size.z), wallMaterial);
            wallW.position.x = -size.x / 2;
            wallW.position.y = 1.5;
            wallW.castShadow = true;
            group.add(wallW);

            // 天井
            const ceiling = new THREE.Mesh(
                new THREE.PlaneGeometry(size.x, size.z),
                new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.5) })
            );
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = 3;
            ceiling.receiveShadow = true;
            group.add(ceiling);

            group.position.copy(position);
            return group;
        }

        // ルーム作成
        const rooms = {
            entrance: createRoom('entrance', 0x004400, new THREE.Vector3(0, 0, 0), { x: 20, z: 20 }),
            left: createRoom('left', 0x003300, new THREE.Vector3(-25, 0, 0), { x: 20, z: 20 }),
            right: createRoom('right', 0x004400, new THREE.Vector3(25, 0, 0), { x: 20, z: 20 }),
            back: createRoom('back', 0x333300, new THREE.Vector3(0, 0, 40), { x: 20, z: 20 })
        };

        scene.add(rooms.entrance);
        scene.add(rooms.left);
        scene.add(rooms.right);
        scene.add(rooms.back);

        // ─── 3D パズルオブジェクト作成ヘルパー ───

        // 暗号錠（コントロールパネル）
        function createCipherLock(position) {
            const g = new THREE.Group();
            // パネル本体
            g.add(Object.assign(new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1.2, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.8 })
            ), { castShadow: true }));
            // 画面
            const screen = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.4, 0.05),
                new THREE.MeshStandardMaterial({ color: 0x00ff44, emissive: 0x00ff44, emissiveIntensity: 0.7 })
            );
            screen.position.set(0, 0.2, 0.18);
            g.add(screen);
            // テンキー（3×3）
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const btn = new THREE.Mesh(
                        new THREE.BoxGeometry(0.11, 0.11, 0.05),
                        new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.5 })
                    );
                    btn.position.set((c - 1) * 0.16, -0.18 + r * 0.15, 0.18);
                    g.add(btn);
                }
            }
            // 南京錠シンボル（円柱）
            const shackle = new THREE.Mesh(
                new THREE.TorusGeometry(0.09, 0.025, 8, 12),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.9 })
            );
            shackle.position.set(0, 0.68, 0.05);
            g.add(shackle);
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.14, 0.06),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.9 })
            );
            body.position.set(0, 0.57, 0.05);
            g.add(body);
            g.position.copy(position);
            return g;
        }

        // スフィンクス像
        function createSphinx(position) {
            const g = new THREE.Group();
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0xc8a06a, roughness: 0.9 });
            // 胴体（ライオンの体）
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 2.2), stoneMat);
            torso.position.set(0, 0.4, 0);
            torso.castShadow = true;
            g.add(torso);
            // 首
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 0.5, 8), stoneMat);
            neck.position.set(0, 0.95, -0.7);
            g.add(neck);
            // 頭
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.6), stoneMat);
            head.position.set(0, 1.4, -0.7);
            head.castShadow = true;
            g.add(head);
            // ネメスヘッドドレス
            const headdress = new THREE.Mesh(
                new THREE.CylinderGeometry(0.25, 0.45, 0.55, 8),
                new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.7 })
            );
            headdress.position.set(0, 1.85, -0.7);
            g.add(headdress);
            // 前足（左右）
            [-0.45, 0.45].forEach(x => {
                const paw = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.28, 0.8), stoneMat);
                paw.position.set(x, 0.14, -1.15);
                g.add(paw);
            });
            // 台座
            const base = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 0.2, 2.6),
                new THREE.MeshStandardMaterial({ color: 0xa08050, roughness: 1.0 })
            );
            base.position.set(0, 0, 0);
            base.receiveShadow = true;
            g.add(base);
            g.position.copy(position);
            return g;
        }

        // 黒板（数学パズル）
        function createChalkboard(position) {
            const g = new THREE.Group();
            // 木枠
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 1.4, 0.12),
                new THREE.MeshStandardMaterial({ color: 0x6b3a2a, roughness: 0.9 })
            );
            frame.castShadow = true;
            g.add(frame);
            // 黒板面
            const board = new THREE.Mesh(
                new THREE.BoxGeometry(1.6, 1.2, 0.06),
                new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 1.0 })
            );
            board.position.z = 0.07;
            g.add(board);
            // チョーク受け
            const tray = new THREE.Mesh(
                new THREE.BoxGeometry(1.6, 0.08, 0.14),
                new THREE.MeshStandardMaterial({ color: 0x4a2010, roughness: 0.8 })
            );
            tray.position.set(0, -0.64, 0.05);
            g.add(tray);
            // 白いチョーク棒
            const chalk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, 0.18, 6),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            chalk.rotation.z = Math.PI / 2;
            chalk.position.set(-0.1, -0.64, 0.12);
            g.add(chalk);
            g.position.copy(position);
            return g;
        }

        // シンボル表示パネル（シーケンスパズル）
        function createSymbolPanel(position) {
            const g = new THREE.Group();
            // キャビネット
            const cabinet = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.6, 0.4),
                new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.4, metalness: 0.4 })
            );
            cabinet.castShadow = true;
            g.add(cabinet);
            // 画面
            const screen = new THREE.Mesh(
                new THREE.BoxGeometry(1.0, 0.7, 0.04),
                new THREE.MeshStandardMaterial({ color: 0x0033cc, emissive: 0x001188, emissiveIntensity: 0.7 })
            );
            screen.position.set(0, 0.25, 0.22);
            g.add(screen);
            // 4つのシンボルボタン（異なる色）
            [0xffee00, 0xff2222, 0x22ff22, 0x2222ff].forEach((col, i) => {
                const btn = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 10, 10),
                    new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.4 })
                );
                btn.position.set((i - 1.5) * 0.24, -0.42, 0.22);
                g.add(btn);
            });
            // スピーカーグリル穴（装飾）
            for (let r = 0; r < 3; r++) {
                const grill = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.04, 0.05),
                    new THREE.MeshStandardMaterial({ color: 0x111120 })
                );
                grill.position.set(0, -0.62 + r * 0.08, 0.22);
                g.add(grill);
            }
            g.position.copy(position);
            return g;
        }

        // 金庫（コード解読）
        function createSafe(position) {
            const g = new THREE.Group();
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x282828, roughness: 0.2, metalness: 0.95 });
            // 本体
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.9, 0.7), metalMat);
            body.castShadow = true;
            g.add(body);
            // ドア（わずかに前面）
            const door = new THREE.Mesh(
                new THREE.BoxGeometry(1.3, 1.8, 0.08),
                new THREE.MeshStandardMaterial({ color: 0x353535, roughness: 0.15, metalness: 0.98 })
            );
            door.position.z = 0.39;
            g.add(door);
            // ダイヤル（外周リング）
            const dialRim = new THREE.Mesh(
                new THREE.TorusGeometry(0.22, 0.04, 10, 24),
                new THREE.MeshStandardMaterial({ color: 0xcc9900, metalness: 0.9, roughness: 0.1 })
            );
            dialRim.rotation.x = Math.PI / 2;
            dialRim.position.set(0.15, -0.1, 0.44);
            g.add(dialRim);
            // ダイヤル中心
            const dialCenter = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 0.08, 16),
                new THREE.MeshStandardMaterial({ color: 0xddaa00, metalness: 0.95 })
            );
            dialCenter.rotation.x = Math.PI / 2;
            dialCenter.position.set(0.15, -0.1, 0.44);
            g.add(dialCenter);
            // ハンドル
            const handleBar = new THREE.Mesh(
                new THREE.BoxGeometry(0.07, 0.44, 0.07),
                new THREE.MeshStandardMaterial({ color: 0xaa7700, metalness: 0.8 })
            );
            handleBar.position.set(-0.32, 0, 0.44);
            g.add(handleBar);
            // ヒンジ（上下）
            [-0.78, 0.78].forEach(y => {
                const hinge = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.05, 0.14, 8),
                    new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 })
                );
                hinge.rotation.z = Math.PI / 2;
                hinge.position.set(0.62, y, 0.39);
                g.add(hinge);
            });
            g.position.copy(position);
            return g;
        }

        // ─── パズルオブジェクトをシーンに配置 ───
        const puzzleMarkers = {};
        const puzzleBuilders = {
            cipher_lock:   createCipherLock,
            riddle_sphinx: createSphinx,
            math_puzzle:   createChalkboard,
            symbol_order:  createSymbolPanel,
            code_puzzle:   createSafe
        };
        for (const [id, puzzle] of Object.entries(puzzles)) {
            const obj = puzzleBuilders[id](puzzle.position);
            scene.add(obj);
            puzzleMarkers[id] = obj;
            // 発光する小球をマーカーとして足元に追加（未クリア時）
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 10, 10),
                new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff6600, emissiveIntensity: 1.0 })
            );
            glow.position.copy(puzzle.position);
            glow.position.y = 0.2;
            glow.userData.puzzleGlow = id;
            scene.add(glow);
        }

        // ─── 3D アイテムオブジェクト作成 ───

        // 鍵
        function createKey3D(pos, name, id) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.95, roughness: 0.05 });
            // 環（トーラス）
            g.add(new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.025, 8, 20), mat));
            // 軸
            const shaft = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.3, 0.03), mat);
            shaft.position.set(0, -0.25, 0);
            g.add(shaft);
            // 歯 (2本)
            [{ y: -0.32, x: 0.06 }, { y: -0.4, x: 0.06 }].forEach(t => {
                const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.03), mat);
                tooth.position.set(t.x, t.y, 0);
                g.add(tooth);
            });
            g.position.copy(pos);
            g.userData = { name, id };
            return g;
        }

        // メモ（紙）
        function createNote3D(pos, name, id) {
            const g = new THREE.Group();
            const paper = new THREE.Mesh(
                new THREE.BoxGeometry(0.28, 0.36, 0.01),
                new THREE.MeshStandardMaterial({ color: 0xffffc8, roughness: 1.0 })
            );
            g.add(paper);
            for (let i = 0; i < 4; i++) {
                const line = new THREE.Mesh(
                    new THREE.BoxGeometry(0.2, 0.012, 0.015),
                    new THREE.MeshStandardMaterial({ color: 0x4444cc })
                );
                line.position.set(0, 0.1 - i * 0.07, 0);
                g.add(line);
            }
            g.position.copy(pos);
            g.userData = { name, id };
            return g;
        }

        // パズルピース
        function createPuzzlePiece3D(pos, name, id) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.6 });
            const base = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.07, 0.24), mat);
            g.add(base);
            // コネクタ突起
            [[0.14, 0], [-0.14, 0], [0, 0.14], [0, -0.14]].forEach(([x, z]) => {
                const nub = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), mat);
                nub.position.set(x, 0, z);
                g.add(nub);
            });
            g.position.copy(pos);
            g.userData = { name, id };
            return g;
        }

        // ハンマー
        function createHammer3D(pos, name, id) {
            const g = new THREE.Group();
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
            const headMat   = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.3 });
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.55, 8), handleMat);
            g.add(handle);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.14, 0.1), headMat);
            head.position.set(0, 0.32, 0);
            g.add(head);
            g.position.copy(pos);
            g.userData = { name, id };
            return g;
        }

        // ロープ（コイル）
        function createRope3D(pos, name, id) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xd4a866, roughness: 1.0 });
            // 複数のトーラスを重ねてコイル状に
            for (let i = 0; i < 4; i++) {
                const coil = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.03, 6, 16), mat);
                coil.rotation.x = Math.PI / 2;
                coil.position.set(0, i * 0.06 - 0.09, 0);
                g.add(coil);
            }
            g.position.copy(pos);
            g.userData = { name, id };
            return g;
        }

        // ─── アイテムをシーンに配置 ───
        const items = [];
        const itemBuilders = [
            { fn: createKey3D,       pos: new THREE.Vector3(-8, 1, 5),  name: '🔑 鍵',     id: 'key' },
            { fn: createNote3D,      pos: new THREE.Vector3(-8, 1, -5), name: '📝 メモ',   id: 'note' },
            { fn: createPuzzlePiece3D, pos: new THREE.Vector3(8, 1, 5), name: '🧩 パズル', id: 'puzzle' },
            { fn: createHammer3D,    pos: new THREE.Vector3(25, 1, 0),  name: '🔨 ハンマー', id: 'hammer' },
            { fn: createRope3D,      pos: new THREE.Vector3(25, 1, 10), name: '🪢 ロープ', id: 'rope' },
        ];
        for (const { fn, pos, name, id } of itemBuilders) {
            const obj = fn(pos, name, id);
            obj.castShadow = true;
            obj.userData._baseY = pos.y;
            scene.add(obj);
            items.push(obj);
        }

        // パズルダイアログを閉じる
        function closePuzzleDialog() {
            document.getElementById('puzzleDialog').classList.remove('active');
            document.getElementById('puzzleOverlay').classList.remove('active');
        }

        // パズルダイアログ表示
        function showPuzzleDialog(puzzleId) {
            const puzzle = puzzles[puzzleId];
            const dialog = document.getElementById('puzzleDialog');
            const overlay = document.getElementById('puzzleOverlay');

            let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                <h2 style="margin:0;">${puzzle.question}</h2>
                <button class="puzzle-btn" onclick="closePuzzleDialog()" style="width:34px;height:34px;padding:0;font-size:20px;line-height:1;flex-shrink:0;margin-left:10px;">×</button>
            </div>`;
            
            if (puzzle.type === 'cipher') {
                html += `<div class="puzzle-question">🔐 ${puzzle.cipherText}</div>`;
                html += `<div class="puzzle-input"><input type="text" id="input" placeholder="答え" autofocus></div>`;
            } else if (puzzle.type === 'riddle' || puzzle.type === 'sequence') {
                html += `<div class="puzzle-question">${puzzle.riddle || puzzle.sequence}</div><div class="puzzle-options">`;
                puzzle.options.forEach(opt => {
                    html += `<button class="puzzle-btn" onclick="game.solvePuzzle('${puzzleId}', '${opt}')">${opt}</button>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="puzzle-question">${puzzle.problem}</div>`;
                html += `<div class="puzzle-input"><input type="text" id="input" placeholder="答え" autofocus></div>`;
            }

            html += `<button class="puzzle-btn" onclick="game.solvePuzzle('${puzzleId}')" style="width: 100%; margin-top: 10px;">送信</button>`;

            dialog.innerHTML = html;
            dialog.classList.add('active');
            overlay.classList.add('active');

            if (document.getElementById('input')) {
                document.getElementById('input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') game.solvePuzzle(puzzleId);
                });
            }
        }

        game.solvePuzzle = function(puzzleId, answer = null) {
            const puzzle = puzzles[puzzleId];
            const userAnswer = answer || document.getElementById('input').value;

            if (userAnswer.toUpperCase() === puzzle.answer.toUpperCase()) {
                puzzle.solved = true;
                game.addMessage('✓ 正解！');
                document.getElementById('puzzleDialog').classList.remove('active');
                document.getElementById('puzzleOverlay').classList.remove('active');
            } else {
                game.addMessage('✗ 不正解...');
            }
        };

        // 相互作用処理
        function handleInteract() {
            // パズル
            for (const [id, puzzle] of Object.entries(puzzles)) {
                if (!puzzle.solved && player.position.distanceTo(puzzle.position) < 2) {
                    showPuzzleDialog(id);
                    return;
                }
            }
            
            // アイテム
            for (let i = items.length - 1; i >= 0; i--) {
                if (player.position.distanceTo(items[i].position) < 1.5) {
                    game.addMessage(`✓ ${items[i].userData.name} を取得`);
                    game.inventory.push(items[i].userData.id);
                    scene.remove(items[i]);
                    items.splice(i, 1);
                    return;
                }
            }
        }

        // プレイヤー移動更新
        function updatePlayer() {
            const speed = keys['shift'] ? player.sprintSpeed : player.speed;
            let moveX = 0, moveZ = 0;

            if (keys['w']) moveZ -= speed;
            if (keys['s']) moveZ += speed;
            if (keys['a']) moveX += speed;  // A = 右移動
            if (keys['d']) moveX -= speed;  // D = 左移動

            // 矢印キーで視点移動
            const viewSpeed = 0.03;
            if (keys['arrowleft'])  yaw += viewSpeed;
            if (keys['arrowright']) yaw -= viewSpeed;
            if (keys['arrowup'])   pitch = Math.min(Math.PI / 2, pitch + viewSpeed);
            if (keys['arrowdown']) pitch = Math.max(-Math.PI / 2, pitch - viewSpeed);

            // カメラ方向に合わせて移動
            const cos = Math.cos(yaw);
            const sin = Math.sin(yaw);
            player.position.x += moveX * cos - moveZ * sin;
            player.position.z += moveX * sin + moveZ * cos;

            // プレイヤーの位置制限
            player.position.x = Math.max(-40, Math.min(40, player.position.x));
            player.position.z = Math.max(-10, Math.min(50, player.position.z));

            // カメラ更新
            camera.position.copy(player.position);

            // カメラ方向更新
            const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
            const direction = new THREE.Vector3(0, 0, -1).applyEuler(euler);
            camera.lookAt(camera.position.clone().add(direction));

            // 現在いる部屋を判定
            let roomLabel = '入口';
            if (Math.abs(player.position.x + 25) < 13 && Math.abs(player.position.z) < 13) roomLabel = '左の部屋';
            else if (Math.abs(player.position.x - 25) < 13 && Math.abs(player.position.z) < 13) roomLabel = '右の部屋';
            else if (Math.abs(player.position.x) < 13 && Math.abs(player.position.z - 40) < 13) roomLabel = '奥の部屋';
            game.currentRoom = roomLabel;

            // UI更新
            document.getElementById('roomName').textContent = game.currentRoom;
            document.getElementById('inventory').textContent = game.inventory.length > 0 
                ? game.inventory.join(', ')
                : 'なし';

            const solvedCount = Object.values(puzzles).filter(p => p.solved).length;
            document.getElementById('puzzleProgress').textContent = `${solvedCount}/5`;

            // 脱出チェック
            if (player.position.z > 45 && solvedCount === 5 && !game.escaped) {
                game.escaped = true;
                game.addMessage('🎉 脱出成功！');
            }
        }

        // ゲームループ
        function animate() {
            requestAnimationFrame(animate);
            updatePlayer();

            // アイテムをふわふわ回転させる
            const t = performance.now() * 0.001;
            items.forEach((item, i) => {
                item.rotation.y = t + i * 1.3;
                item.position.y = item.userData._baseY
                    + Math.sin(t * 1.5 + i) * 0.08;
            });

            // 解決済みパズルのグロービームを非表示にする
            scene.traverse(obj => {
                if (obj.userData.puzzleGlow) {
                    obj.visible = !puzzles[obj.userData.puzzleGlow].solved;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
