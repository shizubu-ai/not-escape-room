<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Escape Room 3D 🔓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Gothic', 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            width: 100%;
            height: 100vh;
        }

        #canvas {
            display: block;
        }

        .ui-container {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #00ff00;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            z-index: 100;
            pointer-events: none;
        }

        .hud {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            border-radius: 3px;
            padding: 10px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .info-panel {
            position: fixed;
            right: 10px;
            top: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 3px;
            padding: 15px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            color: #00ff00;
            font-size: 12px;
            z-index: 100;
        }

        .info-section {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff00;
        }

        .info-label {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .info-content {
            color: #00ff00;
        }

        .controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 3px;
            padding: 10px;
            color: #00ff00;
            font-size: 12px;
            max-width: 400px;
            z-index: 100;
        }

        .puzzle-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95);
            border: 3px solid #ff6600;
            border-radius: 5px;
            padding: 30px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.5);
            display: none;
            pointer-events: all;
        }

        .puzzle-dialog.active {
            display: block;
        }

        .puzzle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
            pointer-events: all;
        }

        .puzzle-overlay.active {
            display: block;
        }

        .puzzle-dialog h2 {
            color: #ff6600;
            margin-bottom: 15px;
            text-align: center;
        }

        .puzzle-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 15px;
        }

        .puzzle-header h2 {
            margin-bottom: 0;
            flex: 1;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #ff6600;
            border-radius: 50%;
            background: transparent;
            color: #ff6600;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .close-btn:hover {
            background: #ff6600;
            color: #000;
        }

        .puzzle-question {
            color: #00ff00;
            margin-bottom: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-left: 3px solid #ff6600;
            border-radius: 3px;
        }

        .puzzle-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .puzzle-btn {
            padding: 10px;
            background: #1a1a1a;
            color: #00ff00;
            border: 2px solid #ff6600;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'MS Gothic', monospace;
        }

        .puzzle-btn:hover {
            background: #ff6600;
            color: #000;
        }

        .puzzle-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .puzzle-input input {
            flex: 1;
            padding: 8px;
            background: #000;
            color: #00ff00;
            border: 2px solid #ff6600;
            font-family: 'MS Gothic', monospace;
        }

        .message {
            position: fixed;
            bottom: 120px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            padding: 10px;
            border-radius: 3px;
            max-width: 400px;
            color: #00ff00;
            z-index: 100;
            font-size: 12px;
            animation: fadeInOut 3s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            pointer-events: none;
            z-index: 101;
            opacity: 0.5;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #00ff00;
        }

        .crosshair::before {
            width: 2px;
            height: 10px;
            left: 50%;
            top: -15px;
            transform: translateX(-50%);
        }

        .crosshair::after {
            width: 10px;
            height: 2px;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>

    <div class="ui-container">
        <div class="hud">
            <div>🔓 Not Escape Room 3D</div>
            <div id="roomStatus">入口</div>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-section">
            <div class="info-label">【現在地】</div>
            <div class="info-content" id="roomName">入口</div>
        </div>
        <div class="info-section">
            <div class="info-label">【インベントリ】</div>
            <div class="info-content" id="inventory">なし</div>
        </div>
        <div class="info-section">
            <div class="info-label">【パズル進捗】</div>
            <div class="info-content" id="puzzleProgress">0/5</div>
        </div>
        <div class="info-section">
            <div class="info-label">【操作ガイド】</div>
            <div class="info-content" style="font-size: 11px;">
                W: 前進 / S: 後退<br>
                A: 右移動 / D: 左移動<br>
                ↑↓←→: 視点回転<br>
                E: 相互作用<br>
                H: ヒント<br>
                ESC: 閉じる
            </div>
        </div>
    </div>

    <div class="controls">
        <div id="interactionHint">💡 Eキーで近くのオブジェクトと相互作用できます</div>
        <div>🎮 矢印キーで視点を動かせます</div>
        <div>❓ Hキーでヒントを表示</div>
    </div>

    <div class="crosshair"></div>

    <div class="puzzle-overlay" id="puzzleOverlay"></div>
    <div class="puzzle-dialog" id="puzzleDialog"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x11151b);
        scene.fog = new THREE.Fog(0x11151b, 28, 95);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('gameContainer').appendChild(renderer.domElement);

        const ambientLight = new THREE.HemisphereLight(0xc9d8ff, 0x1d130b, 0.85);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xfff1d6, 1.1);
        directionalLight.position.set(18, 28, 12);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 90;
        directionalLight.shadow.camera.left = -35;
        directionalLight.shadow.camera.right = 35;
        directionalLight.shadow.camera.top = 35;
        directionalLight.shadow.camera.bottom = -35;
        scene.add(directionalLight);

        [
            { x: 0, y: 2.6, z: -1, color: 0xffd9a8, intensity: 1.4 },
            { x: -8, y: 2.8, z: 20, color: 0xfff0cc, intensity: 1.2 },
            { x: 8, y: 2.8, z: 20, color: 0xf4f3ff, intensity: 1.15 },
            { x: 0, y: 2.8, z: 40, color: 0xffe6bf, intensity: 1.3 }
        ].forEach((lamp) => {
            const light = new THREE.PointLight(lamp.color, lamp.intensity, 24, 2);
            light.position.set(lamp.x, lamp.y, lamp.z);
            light.castShadow = true;
            scene.add(light);
        });

        function createCanvasTexture(draw) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            draw(ctx, canvas.width, canvas.height);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const floorTexture = createCanvasTexture((ctx, width, height) => {
            ctx.fillStyle = '#6f5334';
            ctx.fillRect(0, 0, width, height);
            for (let x = 0; x < width; x += 32) {
                ctx.fillStyle = x % 64 === 0 ? '#7e6041' : '#64492f';
                ctx.fillRect(x, 0, 30, height);
            }
            ctx.strokeStyle = 'rgba(35, 20, 10, 0.4)';
            ctx.lineWidth = 2;
            for (let y = 0; y < height; y += 64) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        });
        floorTexture.repeat.set(6, 6);

        const wallTexture = createCanvasTexture((ctx, width, height) => {
            ctx.fillStyle = '#8b8e91';
            ctx.fillRect(0, 0, width, height);
            for (let y = 0; y < height; y += 22) {
                ctx.fillStyle = y % 44 === 0 ? '#94989b' : '#7f8387';
                ctx.fillRect(0, y, width, 12);
            }
            for (let i = 0; i < 300; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.08})`;
                ctx.fillRect(Math.random() * width, Math.random() * height, 2, 2);
            }
        });
        wallTexture.repeat.set(4, 2);

        const ceilingTexture = createCanvasTexture((ctx, width, height) => {
            ctx.fillStyle = '#c2b8a5';
            ctx.fillRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(120, 105, 80, 0.25)';
            ctx.lineWidth = 3;
            for (let x = 0; x <= width; x += 42) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
        });
        ceilingTexture.repeat.set(5, 5);

        const woodTexture = createCanvasTexture((ctx, width, height) => {
            ctx.fillStyle = '#755032';
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < 120; i++) {
                const y = Math.random() * height;
                ctx.strokeStyle = `rgba(45, 25, 10, ${0.08 + Math.random() * 0.15})`;
                ctx.lineWidth = 1 + Math.random() * 2;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.bezierCurveTo(width * 0.35, y + Math.random() * 8, width * 0.65, y - Math.random() * 8, width, y + Math.random() * 10);
                ctx.stroke();
            }
        });
        woodTexture.repeat.set(2, 2);

        const stoneTexture = createCanvasTexture((ctx, width, height) => {
            ctx.fillStyle = '#97928d';
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < 500; i++) {
                const shade = 120 + Math.floor(Math.random() * 80);
                ctx.fillStyle = `rgba(${shade},${shade},${shade},0.35)`;
                ctx.beginPath();
                ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 4, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        stoneTexture.repeat.set(2, 2);

        const metalTexture = createCanvasTexture((ctx, width, height) => {
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#b5bcc8');
            gradient.addColorStop(0.5, '#7f8792');
            gradient.addColorStop(1, '#d1d5db');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            for (let i = 0; i < height; i += 6) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }
        });

        const paperTexture = createCanvasTexture((ctx, width, height) => {
            ctx.fillStyle = '#e7d8b0';
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < 120; i++) {
                ctx.fillStyle = `rgba(120, 90, 50, ${Math.random() * 0.08})`;
                ctx.fillRect(Math.random() * width, Math.random() * height, 2, 2);
            }
        });

        const materials = {
            floor: new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 0.82, metalness: 0.05 }),
            wall: new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.95, metalness: 0.02 }),
            ceiling: new THREE.MeshStandardMaterial({ map: ceilingTexture, roughness: 0.9, metalness: 0.04 }),
            wood: new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.72, metalness: 0.12 }),
            darkWood: new THREE.MeshStandardMaterial({ color: 0x493120, map: woodTexture, roughness: 0.78, metalness: 0.1 }),
            metal: new THREE.MeshStandardMaterial({ map: metalTexture, color: 0xc0c6d0, roughness: 0.32, metalness: 0.92 }),
            brass: new THREE.MeshStandardMaterial({ color: 0xd6b36c, roughness: 0.28, metalness: 0.88 }),
            stone: new THREE.MeshStandardMaterial({ map: stoneTexture, roughness: 0.92, metalness: 0.04 }),
            paper: new THREE.MeshStandardMaterial({ map: paperTexture, roughness: 0.96, metalness: 0 }),
            rope: new THREE.MeshStandardMaterial({ color: 0xa8844d, roughness: 0.85, metalness: 0.02 }),
            gem: new THREE.MeshStandardMaterial({ color: 0x6ee7ff, emissive: 0x1d8fa8, emissiveIntensity: 0.55, roughness: 0.15, metalness: 0.3 }),
            screen: new THREE.MeshStandardMaterial({ color: 0x22362f, emissive: 0x65ffbb, emissiveIntensity: 0.8, roughness: 0.42, metalness: 0.25 })
        };

        const player = {
            position: new THREE.Vector3(0, 1.6, -4),
            speed: 0.13,
            sprintSpeed: 0.21
        };
        camera.position.copy(player.position);

        let yaw = 0;
        let pitch = 0;
        let mouseDown = false;
        let previousMouse = { x: 0, y: 0 };
        const mouseSpeed = 0.003;
        const turnSpeed = 0.028;

        renderer.domElement.addEventListener('mousedown', (event) => {
            mouseDown = true;
            previousMouse = { x: event.clientX, y: event.clientY };
        });
        window.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        window.addEventListener('mousemove', (event) => {
            if (!mouseDown) return;
            yaw -= (event.clientX - previousMouse.x) * mouseSpeed;
            pitch -= (event.clientY - previousMouse.y) * mouseSpeed;
            pitch = Math.max(-1.1, Math.min(1.1, pitch));
            previousMouse = { x: event.clientX, y: event.clientY };
        });

        const keys = {};
        const puzzleDialog = document.getElementById('puzzleDialog');
        const puzzleOverlay = document.getElementById('puzzleOverlay');
        const interactionHint = document.getElementById('interactionHint');

        function isPuzzleOpen() {
            return puzzleDialog.classList.contains('active');
        }

        function closePuzzleDialog() {
            puzzleDialog.classList.remove('active');
            puzzleOverlay.classList.remove('active');
        }

        puzzleOverlay.addEventListener('click', closePuzzleDialog);
        window.closePuzzleDialog = closePuzzleDialog;

        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            keys[key] = true;

            if (event.key.startsWith('Arrow')) {
                event.preventDefault();
            }

            if (key === 'e' && !isPuzzleOpen()) handleInteract();
            if (key === 'h') game.showHint();
            if (event.key === 'Escape') closePuzzleDialog();
        });

        document.addEventListener('keyup', (event) => {
            keys[event.key.toLowerCase()] = false;
        });

        const puzzles = {
            cipher_lock: {
                type: 'cipher',
                question: 'ROT13暗号を解読してください',
                cipherText: 'BCYRFFR_SBEYTRG_ZR',
                answer: 'PLEASE_FORGET_ME',
                hint: 'ROT13で13文字シフト',
                solved: false,
                position: new THREE.Vector3(-8, 1.2, 0)
            },
            riddle_sphinx: {
                type: 'riddle',
                question: 'スフィンクスの謎に答えなさい',
                riddle: '朝は4本足、昼間は2本足、夜は3本足。これは何？',
                options: ['人間', '犬', '猫', 'ロボット'],
                answer: '人間',
                hint: '生まれたときは這って移動し、成長すると2本足で歩き、年を取ると杖を使う...',
                solved: false,
                position: new THREE.Vector3(8, 1.5, 0)
            },
            math_puzzle: {
                type: 'math',
                question: 'タンスの暗証計算を解いてください',
                problem: '3 + 5 - 2 = ?',
                answer: '6',
                hint: '順番に計算してください',
                solved: false,
                position: new THREE.Vector3(-8, 1.2, 20)
            },
            symbol_order: {
                type: 'sequence',
                question: '本棚のシンボルの次を答えなさい',
                sequence: '◆ ● ■ ▲ ?',
                options: ['★', '♦', '○', '◆'],
                answer: '★',
                hint: 'パターンを見つけましょう',
                solved: false,
                position: new THREE.Vector3(8, 1.4, 20)
            },
            code_puzzle: {
                type: 'code',
                question: '出口のキーパッドを解読してください',
                problem: 'A=1, B=2, C=3... のとき BEAD = ?',
                answer: '2146',
                hint: 'アルファベット順を数字に変換してください',
                solved: false,
                position: new THREE.Vector3(1.35, 1.45, 49)
            }
        };

        const game = {
            currentRoom: '入口ホール',
            inventory: [],
            messages: [],
            escaped: false,
            ending: '',
            hasTreasure: false,

            addMessage(message) {
                this.messages.push(message);
                const messageElement = document.createElement('div');
                messageElement.className = 'message';
                messageElement.textContent = message;
                document.body.appendChild(messageElement);
                setTimeout(() => messageElement.remove(), 3200);
            },

            addInventoryItem(item) {
                if (!this.inventory.some((entry) => entry.id === item.id)) {
                    this.inventory.push({ id: item.id, name: item.name });
                }
            },

            hasItem(itemId) {
                return this.inventory.some((entry) => entry.id === itemId);
            },

            showHint() {
                for (const puzzle of Object.values(puzzles)) {
                    if (!puzzle.solved && player.position.distanceTo(puzzle.position) < 5.5) {
                        this.addMessage(`💡 ${puzzle.hint}`);
                        return;
                    }
                }
                this.addMessage('💡 近くの未解決パズルに近づくとヒントを聞けます');
            }
        };

        function createBox(width, height, depth, material, position, rotation = {}) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
            mesh.position.copy(position);
            mesh.rotation.set(rotation.x || 0, rotation.y || 0, rotation.z || 0);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        function addFloorArea(centerX, centerZ, width, depth) {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), materials.floor);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(centerX, 0, centerZ);
            floor.receiveShadow = true;
            scene.add(floor);

            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), materials.ceiling);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.set(centerX, 3.2, centerZ);
            ceiling.receiveShadow = true;
            scene.add(ceiling);
        }

        function addWall(width, height, depth, x, y, z) {
            scene.add(createBox(width, height, depth, materials.wall, new THREE.Vector3(x, y, z)));
        }

        function addColumn(x, z) {
            scene.add(createBox(0.45, 3.2, 0.45, materials.stone, new THREE.Vector3(x, 1.6, z)));
        }

        function addCeilingLamp(x, z) {
            const lamp = new THREE.Group();
            lamp.position.set(x, 3.0, z);
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.14, 16), materials.metal);
            const shade = new THREE.Mesh(new THREE.ConeGeometry(0.48, 0.55, 18, 1, true), materials.brass);
            shade.rotation.x = Math.PI;
            shade.position.y = -0.2;
            lamp.add(base, shade);
            scene.add(lamp);
        }

        function buildEnvironment() {
            addFloorArea(0, 0, 24, 20);
            addFloorArea(-8, 20, 16, 20);
            addFloorArea(8, 20, 16, 20);
            addFloorArea(0, 40, 18, 20);

            addWall(24, 3.2, 0.35, 0, 1.6, -10);
            addWall(7.6, 3.2, 0.35, -8.2, 1.6, 10);
            addWall(7.6, 3.2, 0.35, 8.2, 1.6, 10);
            addWall(0.35, 3.2, 20, -12, 1.6, 0);
            addWall(0.35, 3.2, 20, 12, 1.6, 0);

            addWall(0.35, 3.2, 20, -16, 1.6, 20);
            addWall(0.35, 3.2, 20, 16, 1.6, 20);
            addWall(6, 3.2, 0.35, -11, 1.6, 30);
            addWall(6, 3.2, 0.35, 11, 1.6, 30);
            addWall(0.35, 3.2, 6.2, 0, 1.6, 13.1);
            addWall(0.35, 3.2, 6.2, 0, 1.6, 26.9);

            addWall(7.1, 3.2, 0.35, -5.45, 1.6, 30);
            addWall(7.1, 3.2, 0.35, 5.45, 1.6, 30);

        function setPuzzleSolvedVisual(puzzleId) {
            const display = puzzleDisplays[puzzleId];
            const indicator = display && display.userData && display.userData.indicator;
            if (!indicator || !indicator.material) return;
            indicator.material = indicator.material.clone();
            indicator.material.color = new THREE.Color(0x69e381);
            if ('emissive' in indicator.material) {
                indicator.material.emissive = new THREE.Color(0x1f8a39);
                indicator.material.emissiveIntensity = 0.75;
            }
        }

        function showPuzzleDialog(puzzleId) {
            const puzzle = puzzles[puzzleId];
            let html = `
                <div class="puzzle-header">
                    <h2>${puzzle.question}</h2>
                    <button class="close-btn" onclick="closePuzzleDialog()" aria-label="閉じる">×</button>
                </div>
            `;

            if (puzzle.type === 'cipher') {
                html += `<div class="puzzle-question">🔐 ${puzzle.cipherText}</div>`;
                html += `<div class="puzzle-input"><input type="text" id="input" placeholder="答えを入力" autofocus></div>`;
            } else if (puzzle.type === 'riddle' || puzzle.type === 'sequence') {
                html += `<div class="puzzle-question">${puzzle.riddle || puzzle.sequence}</div><div class="puzzle-options">`;
                puzzle.options.forEach((option) => {
                    html += `<button class="puzzle-btn" onclick="game.solvePuzzle('${puzzleId}', '${option}')">${option}</button>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="puzzle-question">${puzzle.problem}</div>`;
                html += `<div class="puzzle-input"><input type="text" id="input" placeholder="答えを入力" autofocus></div>`;
            }

            html += `<button class="puzzle-btn" onclick="game.solvePuzzle('${puzzleId}')" style="width: 100%; margin-top: 10px;">送信</button>`;

            puzzleDialog.innerHTML = html;
            puzzleDialog.classList.add('active');
            puzzleOverlay.classList.add('active');

            const input = document.getElementById('input');
            if (input) {
                input.addEventListener('keypress', (event) => {
                    if (event.key === 'Enter') game.solvePuzzle(puzzleId);
                });
                input.focus();
            }
        }

        game.solvePuzzle = function(puzzleId, answer = null) {
            const puzzle = puzzles[puzzleId];
            const input = document.getElementById('input');
            const userAnswer = (answer ?? (input ? input.value : '')).trim();

            if (!userAnswer) {
                this.addMessage('⚠️ 答えを入力してください');
                return;
            }

            if (userAnswer.toUpperCase() === puzzle.answer.toUpperCase()) {
                puzzle.solved = true;
                setPuzzleSolvedVisual(puzzleId);
                closePuzzleDialog();
                this.addMessage(`✓ ${puzzle.question} を解きました`);
                if (puzzleId === 'code_puzzle') {
                    puzzleDisplays.code_puzzle.userData.door.position.x = 0.95;
                    this.addMessage('🚪 出口の扉が少し開きました');
                }
            } else {
                this.addMessage('✗ 不正解...');
            }
        };

        function toggleCabinet(open) {
            const data = puzzleDisplays.math_puzzle.userData;
            data.open = open;
            data.targetAngle = open ? Math.PI / 2.4 : 0;
            game.addMessage(open ? '🗄️ タンスを開けた' : '🗄️ タンスを閉じた');
        }

        function toggleChest(open) {
            const data = treasureChest.userData;
            data.open = open;
            data.targetAngle = open ? -Math.PI / 2.8 : 0;
            if (open) {
                if (!game.hasItem('key')) {
                    game.addMessage('🔒 宝箱には鍵が必要です');
                    data.open = false;
                    data.targetAngle = 0;
                    return;
                }
                if (!game.hasTreasure) {
                    data.gem.visible = true;
                    game.hasTreasure = true;
                    game.addInventoryItem({ id: 'treasure', name: '💎 宝玉' });
                    game.addMessage('💎 宝箱から宝玉を見つけた！ 真エンド条件を満たしました');
                } else {
                    game.addMessage('📦 宝箱の中はもう空です');
                }
            } else {
                game.addMessage('📦 宝箱を閉じた');
            }
        }

        function handleInteract() {
            if (player.position.distanceTo(puzzles.math_puzzle.position) < 2.4) {
                const cabinetData = puzzleDisplays.math_puzzle.userData;
                if (!cabinetData.open) {
                    toggleCabinet(true);
                } else if (!puzzles.math_puzzle.solved) {
                    showPuzzleDialog('math_puzzle');
                } else {
                    toggleCabinet(false);
                }
                return;
            }

            if (player.position.distanceTo(new THREE.Vector3(4.8, 1, 39.2)) < 2.5) {
                toggleChest(!treasureChest.userData.open);
                return;
            }

            for (const [puzzleId, puzzle] of Object.entries(puzzles)) {
                if (puzzleId === 'math_puzzle' || puzzle.solved) continue;
                if (player.position.distanceTo(puzzle.position) < 2.6) {
                    showPuzzleDialog(puzzleId);
                    return;
                }
            }

            for (let index = items.length - 1; index >= 0; index -= 1) {
                if (player.position.distanceTo(items[index].position) < 1.6) {
                    game.addInventoryItem(items[index].userData);
                    game.addMessage(`✓ ${items[index].userData.name} を取得`);
                    scene.remove(items[index]);
                    items.splice(index, 1);
                    return;
                }
            }

            if (player.position.distanceTo(new THREE.Vector3(0, 1.4, 49)) < 2.8) {
                game.addMessage('🚪 すべてのパズルを解いて出口へ向かってください');
                return;
            }

            game.addMessage('…ここには特に相互作用できるものがありません');
        }

        function getRoomName() {
            if (player.position.z > 30) return '脱出扉の間';
            if (player.position.z > 10 && player.position.x < 0) return '物置';
            if (player.position.z > 10 && player.position.x >= 0) return '図書室';
            return '入口ホール';
        }

        function updateInteractionHint() {
            let hint = '💡 Eキーで近くのオブジェクトと相互作用できます';
            if (player.position.distanceTo(puzzles.math_puzzle.position) < 2.4) {
                hint = !puzzleDisplays.math_puzzle.userData.open
                    ? '🗄️ Eキーでタンスを開ける'
                    : (puzzles.math_puzzle.solved ? '🗄️ Eキーでタンスを閉じる' : '🧮 Eキーでタンスの暗証パズルに挑戦');
            } else if (player.position.distanceTo(new THREE.Vector3(4.8, 1, 39.2)) < 2.5) {
                hint = '📦 Eキーで宝箱を開ける';
            } else if (!puzzles.cipher_lock.solved && player.position.distanceTo(puzzles.cipher_lock.position) < 2.6) {
                hint = '💻 Eキーで暗号端末を調べる';
            } else if (!puzzles.riddle_sphinx.solved && player.position.distanceTo(puzzles.riddle_sphinx.position) < 2.6) {
                hint = '🦁 Eキーでスフィンクスに挑む';
            } else if (!puzzles.symbol_order.solved && player.position.distanceTo(puzzles.symbol_order.position) < 2.6) {
                hint = '📚 Eキーで本棚の図形を読む';
            } else if (!puzzles.code_puzzle.solved && player.position.distanceTo(puzzles.code_puzzle.position) < 2.6) {
                hint = '🔢 Eキーで出口キーパッドを調べる';
            } else {
                const nearbyItem = items.find((item) => player.position.distanceTo(item.position) < 1.6);
                if (nearbyItem) {
                    hint = `✨ Eキーで ${nearbyItem.userData.name} を拾う`;
                }
            }
            interactionHint.textContent = hint;
        }

        function updateAnimatedObjects(time) {
            animatedObjects.forEach((entry) => {
                if (entry.type === 'pickup') {
                    entry.object.rotation.y += 0.02;
                    entry.object.position.y = entry.baseY + Math.sin(time / 480 + entry.object.userData.floatOffset) * 0.05;
                } else if (entry.type === 'cabinet') {
                    const data = entry.object.userData;
                    data.leftPivot.rotation.y += (data.targetAngle - data.leftPivot.rotation.y) * 0.16;
                    data.rightPivot.rotation.y += (-data.targetAngle - data.rightPivot.rotation.y) * 0.16;
                } else if (entry.type === 'chest') {
                    const data = entry.object.userData;
                    data.lidPivot.rotation.x += (data.targetAngle - data.lidPivot.rotation.x) * 0.18;
                    if (data.gem.visible) {
                        data.gem.rotation.y += 0.04;
                    }
                }
            });
        }

        function updatePlayer() {
            if (!isPuzzleOpen()) {
                const speed = keys.shift ? player.sprintSpeed : player.speed;
                let moveX = 0;
                let moveZ = 0;

                if (keys.arrowleft) yaw += turnSpeed;
                if (keys.arrowright) yaw -= turnSpeed;
                if (keys.arrowup) pitch = Math.min(1.1, pitch + turnSpeed * 0.65);
                if (keys.arrowdown) pitch = Math.max(-1.1, pitch - turnSpeed * 0.65);

                if (keys.w) moveZ -= speed;
                if (keys.s) moveZ += speed;
                if (keys.a) moveX += speed;
                if (keys.d) moveX -= speed;

                const cos = Math.cos(yaw);
                const sin = Math.sin(yaw);
                player.position.x += moveX * cos - moveZ * sin;
                player.position.z += moveX * sin + moveZ * cos;

                player.position.x = Math.max(-15.2, Math.min(15.2, player.position.x));
                player.position.z = Math.max(-8.6, Math.min(48.4, player.position.z));
            }

            camera.position.copy(player.position);
            const direction = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            camera.lookAt(camera.position.clone().add(direction));

            game.currentRoom = getRoomName();
            document.getElementById('roomStatus').textContent = game.currentRoom;
            document.getElementById('roomName').textContent = game.currentRoom;
            document.getElementById('inventory').textContent = game.inventory.length > 0
                ? game.inventory.map((entry) => entry.name).join(' / ')
                : 'なし';

            const solvedCount = Object.values(puzzles).filter((puzzle) => puzzle.solved).length;
            document.getElementById('puzzleProgress').textContent = `${solvedCount}/5`;
            updateInteractionHint();

            if (player.position.z > 47 && solvedCount === 5 && !game.escaped) {
                game.escaped = true;
                game.ending = game.hasTreasure ? 'TRUE END' : 'NORMAL END';
                game.addMessage(game.hasTreasure
                    ? '👑 TRUE END：宝玉と共に完全脱出！'
                    : '🚪 NORMAL END：謎を解いて脱出成功！');
            }
        }

        function animate(time = 0) {
            requestAnimationFrame(animate);
            updateAnimatedObjects(time);
            updatePlayer();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
